# Tap requires Python 3.12+. Run tox with a 3.12 interpreter (e.g. uv run tox -e py).
# Tox config for tests and linting (ruff + mypy). CI runs: uv run tox -e py

[tox]
envlist = py
isolated_build = true

[testenv]
allowlist_externals = uv

commands =
    uv sync --extra dev --active
    uv run --active pytest
    uv run --active ruff check tap_rest_api_msdk/ tests/
    uv run --active ruff format --check tap_rest_api_msdk/ tests/
    uv run --active mypy tap_rest_api_msdk/
